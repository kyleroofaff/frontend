# Confirms `main` always builds. Does not deploy — your host (DO Droplet / App Platform) must still run build + upload.
name: Frontend build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
