services:
  db:
    image: postgres:16-alpine
    container_name: tp-postgres-local
    environment:
      POSTGRES_DB: thailand_panties
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - tp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thailand_panties"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    container_name: tp-backend-local
    build:
      context: ../backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_ORIGIN: http://localhost:5173
      DATABASE_URL: postgres://postgres:postgres@db:5432/thailand_panties
      DATABASE_SSL_REQUIRE: "false"
      JWT_SECRET: dev-docker-jwt-secret-change-me
      JWT_EXPIRES_IN: 12h
      EMAIL_MODE: disabled
      ADMIN_EMAIL: admin@example.com
      ALLOW_LEGACY_PLAINTEXT_PASSWORDS: "true"
    ports:
      - "4000:4000"

  frontend:
    container_name: tp-frontend-local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000
        VITE_APP_BASE_URL: http://localhost:5173
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  tp-postgres-data:
