# Production docker-compose for DigitalOcean Droplet.
#
# Layout on server:
#   /opt/thailandpanties/
#     frontend/            ← git clone of kyleroofaff/frontend
#     backend/             ← git clone of kyleroofaff/backend
#     docker-compose.yml   ← this file (copy or symlink)
#     .env                 ← backend secrets (never commit)
#
# Redeploy:
#   cd /opt/thailandpanties
#   git -C frontend pull origin main
#   git -C backend pull origin main
#   docker compose up -d --build

services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://api.thailandpanties.com
        VITE_APP_BASE_URL: https://thailandpanties.com
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4000"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-thailandpanties}
      POSTGRES_USER: ${POSTGRES_USER:-tp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped

volumes:
  pgdata:
